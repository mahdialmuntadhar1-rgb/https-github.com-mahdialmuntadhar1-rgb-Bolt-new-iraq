<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Iraq Compass — بوصلة العراق</title>

    <!-- PWA manifest & theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Iraq Compass" />
    <meta name="application-name" content="Iraq Compass" />
    <meta name="msapplication-TileColor" content="#0A1628" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Icons — PNG required for iOS Safari PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="دليل الأعمال العراقي الأشمل — ٦٬٩٥٥ نشاط تجاري في ٢٠ محافظة. مطاعم، كافيهات، صيدليات والمزيد." />
    <meta property="og:title" content="Iraq Compass — دليل الأعمال العراقي" />
    <meta property="og:description" content="The most comprehensive Iraqi business directory across all 20 governorates." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts — Cairo (Arabic/Kurdish) + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Service Worker — register once, update in background -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) {
              reg.update();
            })
            .catch(function (err) {
              console.warn('SW registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
